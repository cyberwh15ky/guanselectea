<script>
(function(){
  const form = document.querySelector("form");
  if(!form) return;

  const pwd = form.querySelector('input[type="password"]');
  if(!pwd) return;

  const msg = "密碼需至少 8 位，並包含：大寫字母、小寫字母、數字與符號";
  const rule = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;

  function validate(){
    const ok = rule.test(pwd.value || "");
    pwd.setCustomValidity(ok ? "" : msg);
    return ok;
  }

  // Validate as user types (shows red text you already have, but also keeps tooltip message consistent)
  pwd.addEventListener("input", function(){
    validate();
    // don't spam tooltip; just clear/set validity
  });

  form.addEventListener("submit", function(e){
    if(!validate()){
      e.preventDefault();
      // Show browser tooltip (now in Chinese) at the password field
      pwd.reportValidity();

      // Also show the red inline message (same Chinese)
      let el = document.getElementById("passwordRuleError");
      if(!el){
        el = document.createElement("div");
        el.id = "passwordRuleError";
        el.style.color = "#c0392b";
        el.style.fontSize = "14px";
        el.style.marginTop = "6px";
        pwd.parentNode.appendChild(el);
      }
      el.textContent = msg;
    }else{
      // remove inline error if any
      const el = document.getElementById("passwordRuleError");
      if(el) el.textContent = "";
    }
  });
})();
</script>

  function scorePassword(p){
    let score = 0;
    if(!p) return 0;
    // length
    if(p.length >= 8) score += 1;
    if(p.length >= 12) score += 1;
    // diversity
    if(/[a-z]/.test(p)) score += 1;
    if(/[A-Z]/.test(p)) score += 1;
    if(/\d/.test(p)) score += 1;
    if(/[^A-Za-z0-9]/.test(p)) score += 1;
    // cap 0-6
    return Math.min(score, 6);
  }

  if(s >= 6){ label = "強"; color = "rgb(46,139,87)"; width="100%"; }

    strengthBar.style.width = width;
    strengthBar.style.backgroundColor = color;
    strengthText.textContent = label;
    strengthText.style.color = color;
  }

  function validate(){
    const ok = rule.test(pwd.value || "");
    pwd.setCustomValidity(ok ? "" : msg);
    return ok;
  }

  // Toggle show/hide
  if(toggleBtn){
    toggleBtn.addEventListener("click", function(){
      const isPwd = pwd.type === "password";
      pwd.type = isPwd ? "text" : "password";
      toggleBtn.textContent = isPwd ? "🙈" : "👁";
      toggleBtn.setAttribute("aria-label", isPwd ? "隱藏密碼" : "顯示密碼");
    });
  }

  pwd.addEventListener("input", function(){
    setStrengthUI(pwd.value);
    validate(); // keep validity message consistent
  });

  // init
  setStrengthUI(pwd.value);

  form.addEventListener("submit", function(e){

        el.style.marginTop = "6px";

        const after = document.getElementById("pwdStrengthText");
        if(after && after.parentNode){
          after.parentNode.parentNode.appendChild(el);
        }else{
          pwd.parentNode.appendChild(el);
        }
      }
      el.textContent = msg;
    }else{
      const el = document.getElementById("passwordRuleError");
      if(el) el.textContent = "";
    }
  });
})();
