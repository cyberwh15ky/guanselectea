        <div class="flex items-center gap-2">

             class="relative px-3 py-2 rounded-full bg-white/25 hover:bg-white/35 backdrop-blur-md text-sm font-semibold text-[#131D29] flex items-center gap-2">

          <a id="navMember" href="./login.html"
             class="px-3 py-2 rounded-full bg-white/25 hover:bg-white/35 backdrop-blur-md text-sm font-semibold text-[#131D29]">會員登入</a>
        </div>
      </div>

    <div class="flex flex-col items-center justify-center bg-white relative -mt-[10px] w-full max-w-[700px] px-[16px] rounded-t-[10px] shadow-[1px_6px_30px_rgba(0,31,14,0.05)]">

      <div class="w-full text-center pb-[10px] xs:pb-[14px] border-b-[1px] border-black/[.05]">
        <h1 class="text-xl xs:text-2xl mb-[5px] xs:mb-[9px] font-bold text-[#131D29]" style="font-family: &quot;GT Walsheim Pro&quot;;">登入</h1>
        <p class="text-sm xs:text-base text-[#767C83]" style="font-family: &quot;GT Walsheim Pro&quot;;">會員系統（示範版）</p>

<form id="form" class="w-full flex flex-col gap-3">
  <div class="w-full">
    <label class="text-sm text-[#131D29] font-semibold">Email</label>
    <input id="email" type="email" class="w-full mt-1 px-4 py-3 rounded-full border border-black/[.08] outline-none" placeholder="you@example.com" required>
  </div>
  <div class="w-full">
    <label class="text-sm text-[#131D29] font-semibold">Password</label>
    <input id="password" type="password" class="w-full mt-1 px-4 py-3 rounded-full border border-black/[.08] outline-none" placeholder="至少 6 碼" required>
  </div>
  <div id="msg" class="min-h-[20px]"></div>
  <button class="w-full rounded-full py-3 font-semibold text-white hover:opacity-90" style="background-color: rgb(126, 192, 159);" type="submit">登入</button>
  <div class="flex justify-between text-sm mt-2">
    <a class="hover:underline" href="./register.html" style="color: rgb(126, 192, 159);">建立帳號</a>
    <a class="hover:underline" href="./forgot-password.html" style="color: rgb(126, 192, 159);">忘記密碼</a>
  </div>
</form>
<script>
(() => {
  const s = loadSession();
  if (s?.userId) { location.replace("./dashboard.html"); return; }
  const form = document.getElementById("form");
  const msg = document.getElementById("msg");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const res = await loginUser({ email: email.value, password: password.value });
    if (!res.ok) { toast(msg, res.error, false); return; }
    toast(msg, "登入成功，正在前往…", true);
    setTimeout(()=>location.href="./dashboard.html", 500);
  });
})();
</script>
