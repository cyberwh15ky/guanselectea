<div id="profile" class="w-full"></div>
<div class="mt-4 w-full">
  <div class="text-sm text-[#131D29] font-semibold mb-2">Login history（最新 25 筆）</div>
  <div class="w-full max-h-[240px] overflow-auto custom-scroll-bar border border-black/[.06] rounded-[10px]">
    <table class="w-full text-left text-sm">
      <thead class="bg-[#F7F7F7]">
        <tr><th class="p-3">時間</th><th class="p-3">UA</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div class="flex gap-3 mt-4">
    <a class="flex-1 text-center rounded-full py-3 font-semibold text-white hover:opacity-90" style="background-color: rgb(126, 192, 159);" href="../index.html">回首頁</a>
    <button id="logout" class="flex-1 rounded-full py-3 font-semibold border border-black/[.12] hover:bg-[#F7F7F7]">登出</button>
  </div>
</div>
<script>
(() => {
  const s = requireAuth("./login.html");
  if (!s) return;
  const u = getUserById(s.userId);
  if (!u) { clearSession(); location.replace("./login.html"); return; }
  document.getElementById("profile").innerHTML = `
    <div class="w-full border border-black/[.06] rounded-[14px] p-4 bg-[#F7F7F7]">
      <div class="text-[#131D29] font-bold text-lg">${u.firstName} ${u.lastName}</div>
      <div class="text-[#767C83] text-sm">${u.email}</div>
      <div class="text-[#767C83] text-xs mt-1">created: ${u.createdAt}</div>
    </div>
  `;
  const rows = (u.loginHistory||[]).map(h => `
    <tr class="border-t border-black/[.05]">
      <td class="p-3 whitespace-nowrap">${h.at}</td>
      <td class="p-3 break-words">${h.ua}</td>
    </tr>`).join("");
  document.getElementById("rows").innerHTML = rows || `<tr><td class="p-3 text-[#767C83]" colspan="2">尚無紀錄</td></tr>`;
  document.getElementById("logout").addEventListener("click", () => { clearSession(); location.replace("./login.html"); });
})();
</script>

      </div>
    </div>
  </div>
</div>
